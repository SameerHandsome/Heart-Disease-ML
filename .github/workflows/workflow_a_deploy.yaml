name: "Workflow A — Deploy"

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [model-updated]
  workflow_dispatch:

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - 'ml/**'
              - 'monitor/**'
              - 'requirements.txt'
              - 'Dockerfile'
              - '.github/workflows/**'

  test:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.code_changed == 'true'
      || github.event_name == 'repository_dispatch'
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov
      - name: Run tests
        run: pytest tests/ -v --cov=ml --cov=monitor --cov-fail-under=40
        env:
          DATABASE_URL:        "postgresql://t:t@localhost/t"
          UPSTASH_REDIS_URL:   "https://fake.upstash.io"
          UPSTASH_REDIS_TOKEN: "fake"
          HF_TOKEN:            "fake"
          HF_REPO_ID:          "fake/fake"
          WANDB_API_KEY:       "fake"

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Convert owner to lowercase — ghcr.io requires all lowercase image names
      - name: Set lowercase image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=ghcr.io/${OWNER}/heart-disease-api" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_TAG }}:${{ github.sha }}
            ${{ env.IMAGE_TAG }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_TAG }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_TAG }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      HAS_KUBECONFIG: ${{ secrets.KUBECONFIG != '' }}
    steps:
      - name: Check if cluster is configured
        if: env.HAS_KUBECONFIG != 'true'
        run: |
          echo "No KUBECONFIG secret found — skipping deploy."
          echo "Add KUBECONFIG secret to GitHub when you have a cluster."
          exit 0

      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3

      - name: Set lowercase image name
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=ghcr.io/${OWNER}/heart-disease-api" >> $GITHUB_ENV

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Rolling update
        run: |
          kubectl set image deployment/heart-disease-api \
            heart-disease-api=${{ env.IMAGE_TAG }}:${{ github.sha }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/heart-disease-api --timeout=300s
